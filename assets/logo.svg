<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    
    <!-- Accent Gradient 1 (Cyan to Blue) -->
    <linearGradient id="primaryGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#60A5FA" />
    </linearGradient>

    <!-- Accent Gradient 2 (Teal to Emerald) -->
    <linearGradient id="accentGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#34D399" />
    </linearGradient>

    <!-- Accent Gradient 3 (Violet to Fuchsia) -->
    <linearGradient id="highlightGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#A78BFA" />
    </linearGradient>

    <!-- Soft Shadow Filter -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Inner Decorative Elements -->
  <!-- Stylized Weekly Report Grid (Background grid lines) -->
  <g opacity="0.05" stroke="#FFFFFF" stroke-width="2">
    <line x1="64" y1="128" x2="448" y2="128" />
    <line x1="64" y1="192" x2="448" y2="192" />
    <line x1="64" y1="256" x2="448" y2="256" />
    <line x1="64" y1="320" x2="448" y2="320" />
    <line x1="64" y1="384" x2="448" y2="384" />
    <line x1="128" y1="64" x2="128" y2="448" />
    <line x1="256" y1="64" x2="256" y2="448" />
    <line x1="384" y1="64" x2="384" y2="448" />
  </g>

  <!-- Stylized Document Base (Glassmorphic look) -->
  <rect x="112" y="80" width="288" height="352" rx="24" fill="#FFFFFF" fill-opacity="0.03" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="4" filter="url(#dropShadow)" />

  <!-- Document Header Lines -->
  <rect x="152" y="128" width="120" height="20" rx="6" fill="#FFFFFF" fill-opacity="0.4" />
  <rect x="152" y="164" width="70" height="12" rx="4" fill="#FFFFFF" fill-opacity="0.2" />

  <!-- Stylized Chart Bars (The "Viz" part of WeeklyViz) -->
  <!-- Bar 1 (Left - Violet) -->
  <rect x="152" y="272" width="40" height="112" rx="12" fill="url(#highlightGrad)" filter="url(#dropShadow)" />
  
  <!-- Bar 2 (Middle - Blue) -->
  <rect x="216" y="224" width="40" height="160" rx="12" fill="url(#primaryGrad)" filter="url(#dropShadow)" />

  <!-- Bar 3 (Right - Emerald) -->
  <rect x="280" y="304" width="40" height="80" rx="12" fill="url(#accentGrad)" filter="url(#dropShadow)" />

  <!-- Sparkline/Trend Line overlay (Vibrant glowing line) -->
  <path d="M 136 290 L 172 230 L 236 150 L 300 240 L 364 120" fill="none" stroke="#F59E0B" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#dropShadow)" />
  <circle cx="364" cy="120" r="10" fill="#FBBF24" />

  <!-- Bottom Accent Line -->
  <rect x="152" y="402" width="208" height="6" rx="3" fill="#FFFFFF" fill-opacity="0.1" />
</svg>
